<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion / Inscription</title>
    <link rel="stylesheet" href="connexion.css">
    <link rel="stylesheet" href="commun.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="icon" type="image/png" href="images/favicon.jpeg">


</head>

<body>
    <header>
        <nav class="entete">
            <a href="index.html"><i class="bi bi-house"></i></a>
            <img src="images/logo.jpeg" alt="Logo Le Jardin des Tropiques" class="logo">
        </nav>
    </header>
        <div class="contact-page">
            <form id="connexionForm">
                <h1>Connexion</h1>
                <hr>
                <div class="form-group">
                    <label for="mail">Adresse e-mail <span class="required">*</span></label>
                    <input type="email" id="mail" name="mail" placeholder="marie@email.com">
                </div>
                <div class="form-group">
                    <label for="password">Mot de passe <span class="required">*</span></label>
                    <input type="password" id="password" name="password" placeholder="Écrivez votre mot de passe">
                </div>

                <button type="submit" class="btn-submit">Connexion</button>
            </form>

            <form id="inscriptionForm">
                <h1>Inscription</h1>
                <hr>
                <div class="form-group">
                    <label for="mail">Adresse e-mail <span class="required">*</span></label>
                    <input type="email" id="mail" name="mail" placeholder="marie@email.com">
                </div>
                <div class="form-group">
                    <label for="password">Mot de passe <span class="required">*</span></label>
                    <input type="password" id="password" name="password" placeholder="Écrivez votre mot de passe">
                </div>
                <div class="form-group">
                    <label for="password">Réécrivez votre mot de passe <span class="required">*</span></label>
                    <input type="password" id="password" name="password" placeholder="Réécrivez votre mot de passe">
                </div>
                <button type="submit" class="btn-submit">Inscription</button>
            </form>
            <button class="btn-profil"><a href="profil.html">Profil →</a></button>
        </div>
        
    <footer>
        <div class="imgFooter">
            <a href="index.html"><img src="images/logo.jpeg" class="logo"></a>
        </div>
        <div class="contact">
            <a href="contact.html">Contact</a>
            <br>
            <a href="#Instagram"><i class="bi bi-instagram"></i></a>
            <a href="#Twitter"><i class="bi bi-twitter-x"></i></a>
            <a href="#Facebook"><i class="bi bi-facebook"></i></a>
            <br>
            <br>
            <p> <a href="mentions_legales.html">Mentions légales</a> </p>
        </div>
        <div class="map">
            <p>Nous retrouver</p>
            <iframe
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2620.7767880723004!2d1.3358313035699676!3d47.590139484475145!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x47e4a81b51bfac85%3A0x59ec794bc418ff3b!2sIUT%20de%20Blois%20%E2%80%A2%20site%20Jean%20Jaur%C3%A8s!5e1!3m2!1sfr!2sfr!4v1778853098987!5m2!1sfr!2sfr"
                width="500" height="350" style="border:0;" allowfullscreen="" loading="lazy"
                referrerpolicy="no-referrer-when-downgrade"></iframe>
        </div>

    </footer>
</body>

</html>

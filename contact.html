<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact – Le Jardin des Tropiques</title>
    <link rel="stylesheet" href="contact.css">
    <link rel="stylesheet" href="commun.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="icon" type="image/png" href="images/favicon.jpeg">


</head>

<body>
    <header>
        <nav class="entete">
            <a href="index.html"><i class="bi bi-house"></i></a>
            <img src="images/logo.jpeg" alt="Logo Le Jardin des Tropiques" class="logo">
        </nav>
    </header>
    <div class="contact-page">
        <div class="form-wrap">

            <h1>Nous contacter</h1>
            <p class="form-sub">Une question sur une plante, une commande ou un produit ? On vous répond sous 24h.</p>
            <hr class="divider">
            <form id="contactForm" novalidate>

                <div class="form-row">
                    <div class="form-group">
                        <label for="nom">Nom <span class="required">*</span></label>
                        <input type="text" id="nom" name="nom" placeholder="Dupont">
                    </div>
                    <div class="form-group">
                        <label for="prenom">Prénom <span class="required">*</span></label>
                        <input type="text" id="prenom" name="prenom" placeholder="Marie">
                    </div>
                </div>

                <div class="form-group">
                    <label for="mail">Adresse e-mail <span class="required">*</span></label>
                    <input type="email" id="mail" name="mail" placeholder="marie@email.com">
                </div>

                <div class="form-group">
                    <label for="sujet">Sujet <span class="required">*</span></label>
                    <select id="sujet" name="sujet">
                        <option value="" disabled selected>Choisir un sujet</option>
                        <option value="produit">Question sur un produit</option>
                        <option value="commande">Suivi de commande</option>
                        <option value="probleme">Problème avec ma commande</option>
                        <option value="conseil">Conseil jardinage / plantes</option>
                        <option value="autre">Autre</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="message">Message <span class="required">*</span></label>
                    <textarea id="message" name="message" placeholder="Décrivez votre demande..."></textarea>
                </div>

                <button type="submit" class="btn-submit">Envoyer le message</button>

            </form>
        </div>
    </div>
    <footer>
        <div class="imgFooter">
            <a href="index.html"><img src="images/logo.jpeg" class="logo"></a>
        </div>
        <div class="contact">
            <a href="contact.html">Contact</a>
            <br>
            <a href="#Instagram"><i class="bi bi-instagram"></i></a>
            <a href="#Twitter"><i class="bi bi-twitter-x"></i></a>
            <a href="#Facebook"><i class="bi bi-facebook"></i></a>
            <br>
            <br>
            <p> <a href="mentions_legales.html">Mentions légales</a> </p>
        </div>
        <div class="map">
            <p>Nous retrouver</p>
            <iframe
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2620.7767880723004!2d1.3358313035699676!3d47.590139484475145!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x47e4a81b51bfac85%3A0x59ec794bc418ff3b!2sIUT%20de%20Blois%20%E2%80%A2%20site%20Jean%20Jaur%C3%A8s!5e1!3m2!1sfr!2sfr!4v1778853098987!5m2!1sfr!2sfr"
                width="500" height="350" style="border:0;" allowfullscreen="" loading="lazy"
                referrerpolicy="no-referrer-when-downgrade"></iframe>
        </div>

    </footer>
    <script src="index.js"></script>
</body>

</html>
